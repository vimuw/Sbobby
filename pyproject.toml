[tool.ruff]
target-version = "py311"
extend-exclude = [
  ".venv",
  "build",
  "dist",
  "test_dist",
  "webui/dist",
  "webui/node_modules",
]

[tool.ruff.lint]
select = [
    "E9",   # syntax errors
    "F63",  # invalid literals / assert
    "F7",   # statement errors (return outside function, etc.)
    "F82",  # undefined names
    "E711", # comparison to None via == / !=
    "E712", # comparison to True/False via == / !=
    "E721", # type comparison — prefer isinstance()
    "E722", # bare except:
    "F841", # local variable assigned but never used
    "C90",  # McCabe cyclomatic complexity
]

[tool.ruff.lint.mccabe]
max-complexity = 20

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "basic"
include = ["el_sbobinator", "scripts", "tests"]
exclude = [".venv", "build", "dist", "test_dist", "webui/dist", "webui/node_modules"]
reportMissingModuleSource = "none"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.coverage.run]
source = ["el_sbobinator"]
omit = [
    "*/__init__.py",
    "el_sbobinator/app.py",
    "el_sbobinator/webview_entry.py",
    "el_sbobinator/ffmpeg_utils.py",
    "el_sbobinator/updater.py",
    "el_sbobinator/config_service.py",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
