name: Build and Release El Sbobinator

on:
  push:
    branches:
      - main
    tags:
      - 'v*' # Trigger build only when a new version tag (e.g. v1.0.0) is pushed
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional: tag to publish a Release (e.g. v1.2.3). Leave empty for build-only.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  checks:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements/requirements.lock
            requirements/requirements-dev.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: webui/package-lock.json

      - name: Install Dependencies
        run: |
          python scripts/build_release.py deps --ui webui --dev

      - name: Run Checks
        run: |
          python scripts/build_release.py check --with-coverage --skip-npm-install
          python scripts/build_release.py validate

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-python.xml,webui/coverage/lcov.info
          flags: python,frontend
          fail_ci_if_error: true

  build:
    needs: checks
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset_name: El-Sbobinator-Windows-Setup
          - os: macos-latest
            asset_name: El-Sbobinator-MacOS-DMG

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements/requirements.lock
            requirements/requirements-dev.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: webui/package-lock.json

      - name: Install Dependencies
        run: |
          python scripts/build_release.py deps --ui webui

      - name: Extract version and sync package.json
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            APP_VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ inputs.release_tag }}" ]]; then
            APP_VERSION="${{ inputs.release_tag }}"
            APP_VERSION="${APP_VERSION#v}"
          else
            APP_VERSION="0.0.0"
          fi
          echo "APP_VERSION=${APP_VERSION}" >> $GITHUB_ENV
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./webui/package.json','utf8'));
            pkg.version = '${APP_VERSION}';
            fs.writeFileSync('./webui/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Version set to ${APP_VERSION}"

      - name: Install Inno Setup (Windows)
        if: runner.os == 'Windows'
        run: choco install innosetup -y

      - name: Install create-dmg (macOS)
        if: runner.os == 'macOS'
        run: brew install create-dmg

      - name: Build Windows Installer
        if: runner.os == 'Windows'
        run: |
          python scripts/build_release.py build --target windows --ui webui --skip-checks --skip-npm-install --version ${{ env.APP_VERSION }}

      - name: Build macOS DMG
        if: runner.os == 'macOS'
        run: |
          python scripts/build_release.py build --target macos --ui webui --skip-checks --skip-npm-install --version ${{ env.APP_VERSION }}

      - name: Upload Build Artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/El-Sbobinator-Setup-v*.exe

      - name: Upload Build Artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/El-Sbobinator-v*.dmg

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    steps:
      - name: Download all workflow run artifacts
        uses: actions/download-artifact@v4
        with:
          path: output_files

      - name: Prepare Release Assets
        run: |
          mkdir release_assets
          find output_files -name "El-Sbobinator-Setup-v*.exe" -exec mv {} release_assets/ \; || echo "Win build not found"
          find output_files -name "El-Sbobinator-v*.dmg" -exec mv {} release_assets/ \; || echo "Mac build not found"

      - name: Publish Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ (startsWith(github.ref, 'refs/tags/') && github.ref_name) || inputs.release_tag }}
          files: release_assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
