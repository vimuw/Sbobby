name: Build and Release El Sbobinator

on:
  push:
    branches:
      - main
    tags:
      - 'v*' # Trigger build only when a new version tag (e.g. v1.0.0) is pushed
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional: tag to publish a Release (e.g. v1.2.3). Leave empty for build-only.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  checks:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.lock
            requirements-dev.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webui/package-lock.json

      - name: Install Dependencies
        run: |
          python scripts/build_release.py deps --ui webui --dev

      - name: Run Checks
        run: |
          python scripts/build_release.py check --skip-npm-install
          python scripts/build_release.py validate

  build:
    needs: checks
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: El Sbobinator.exe
            asset_name: El-Sbobinator-Windows.exe
          - os: macos-latest
            artifact_name: El Sbobinator.app
            asset_name: El-Sbobinator-MacOS.zip

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.lock
            requirements-dev.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webui/package-lock.json

      - name: Install Dependencies
        run: |
          python scripts/build_release.py deps --ui webui

      - name: Verify package.json version matches git tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          PKG_VERSION="v$(node -p "require('./webui/package.json').version")"
          GIT_TAG="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$GIT_TAG" ]; then
            echo "::error::Version mismatch: package.json=$PKG_VERSION tag=$GIT_TAG"
            exit 1
          fi
          echo "Version check passed: $PKG_VERSION"

      - name: Build Windows Executable
        if: runner.os == 'Windows'
        run: |
          python scripts/build_release.py build --target windows --ui webui --skip-checks --skip-npm-install
          python scripts/build_release.py smoke --target windows

      - name: Build macOS App
        if: runner.os == 'macOS'
        run: |
          python scripts/build_release.py build --target macos --ui webui --skip-checks --skip-npm-install
          python scripts/build_release.py smoke --target macos
          cd dist
          zip -r "El-Sbobinator.zip" "El Sbobinator.app"

      - name: Upload Build Artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}

      - name: Upload Build Artifacts (MacOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/El-Sbobinator.zip

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    steps:
      - name: Download all workflow run artifacts
        uses: actions/download-artifact@v4
        with:
          path: output_files

      - name: Prepare Release Assets
        run: |
          mkdir release_assets
          # Move artifacts out of their individual folders for clean release upload
          mv "output_files/El-Sbobinator-Windows.exe/El Sbobinator.exe" "release_assets/El-Sbobinator-Windows.exe" || echo "Win build not found"
          mv "output_files/El-Sbobinator-MacOS.zip/El-Sbobinator.zip" "release_assets/El-Sbobinator-MacOS.zip" || echo "Mac build not found"

      - name: Publish Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ (startsWith(github.ref, 'refs/tags/') && github.ref_name) || inputs.release_tag }}
          files: release_assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
