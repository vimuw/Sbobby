name: Build and Release Sbobby

on:
  push:
    tags:
      - 'v*' # Trigger build only when a new version tag (e.g. v1.0.0) is pushed
  workflow_dispatch: # Allow manual triggering from GitHub UI

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: Sbobby.exe
            asset_name: Sbobby-Windows.exe
          - os: macos-latest
            artifact_name: Sbobby.app
            asset_name: Sbobby-MacOS.zip

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 
          cache: 'pip'

      - name: Install System Dependencies (Linux/Mac)
        if: runner.os == 'macOS'
        run: |
          brew install tcl-tk

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows Executable
        if: runner.os == 'Windows'
        run: |
          pyinstaller --noconfirm --onefile --windowed --collect-all customtkinter --collect-all tkinterdnd2 --collect-all imageio_ffmpeg --name "Sbobby" "Sbobby.pyw"

      - name: Build macOS App
        if: runner.os == 'macOS'
        run: |
          pyinstaller --noconfirm --windowed --collect-all customtkinter --collect-all tkinterdnd2 --collect-all imageio_ffmpeg --name "Sbobby" "Sbobby.pyw"
          cd dist
          zip -r "Sbobby.zip" "Sbobby.app"

      - name: Upload Build Artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}

      - name: Upload Build Artifacts (MacOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/Sbobby.zip

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all workflow run artifacts
        uses: actions/download-artifact@v4
        with:
          path: output_files

      - name: Prepare Release Assets
        run: |
          mkdir release_assets
          # Move artifacts out of their individual folders for clean release upload
          mv output_files/Sbobby-Windows.exe/Sbobby.exe release_assets/Sbobby-Windows.exe || echo "Win build not found"
          mv output_files/Sbobby-MacOS.zip/Sbobby.zip release_assets/Sbobby-MacOS.zip || echo "Mac build not found"

      - name: Publish Release to GitHub
        uses: softprops/action-gh-release@v1
        with:
          files: release_assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
